<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Barcode & QR Scanner</title>

    <!-- Html5-QRCode Library -->
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js">
    </script>

    <style>
        /* ---------- Reset & Base ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0b0e14;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            color: #e8edf5;
        }

        .scanner-container {
            max-width: 520px;
            width: 100%;
            background: #151e2a;
            border-radius: 28px;
            padding: 24px 20px 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7);
            border: 1px solid #2a3648;
            transition: all 0.2s;
        }

        /* ---------- Header ---------- */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 18px;
            padding-bottom: 12px;
            border-bottom: 1px solid #26303f;
        }

        .header h1 {
            font-size: 1.3rem;
            font-weight: 600;
            letter-spacing: 0.3px;
            background: linear-gradient(135deg, #7ec8f0, #4a9eff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .status-dot {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            color: #8899b4;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #4caf50;
            display: inline-block;
            box-shadow: 0 0 8px #4caf5080;
            transition: background 0.3s, box-shadow 0.3s;
        }

        .dot.inactive {
            background: #f44336;
            box-shadow: 0 0 8px #f4433680;
        }

        /* ---------- Viewfinder ---------- */
        .viewfinder-wrapper {
            position: relative;
            border-radius: 18px;
            overflow: hidden;
            background: #0b0e14;
            margin-bottom: 16px;
            aspect-ratio: 1 / 0.85;
            border: 1px solid #2a3648;
        }

        #reader {
            width: 100%;
            height: 100%;
        }

        /* ---------- Overlay corner markers ---------- */
        .corner-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            border-radius: 18px;
        }

        .corner-overlay::before,
        .corner-overlay::after {
            content: '';
            position: absolute;
            width: 30px;
            height: 30px;
            border-color: #4a9eff;
            border-style: solid;
            border-width: 0;
        }

        .corner-overlay::before {
            top: 16px;
            left: 16px;
            border-top-width: 4px;
            border-left-width: 4px;
        }

        .corner-overlay::after {
            top: 16px;
            right: 16px;
            border-top-width: 4px;
            border-right-width: 4px;
        }

        .corner-overlay .br {
            position: absolute;
            bottom: 16px;
            left: 16px;
            width: 30px;
            height: 30px;
            border-bottom: 4px solid #4a9eff;
            border-left: 4px solid #4a9eff;
        }

        .corner-overlay .br2 {
            position: absolute;
            bottom: 16px;
            right: 16px;
            width: 30px;
            height: 30px;
            border-bottom: 4px solid #4a9eff;
            border-right: 4px solid #4a9eff;
        }

        /* ---------- Controls ---------- */
        .controls {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin: 12px 0 16px;
        }

        .controls button {
            flex: 1;
            min-width: 100px;
            padding: 12px 10px;
            border: none;
            border-radius: 14px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            background: #26303f;
            color: #b0c4de;
            letter-spacing: 0.3px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .controls button:hover {
            background: #2f3b4e;
            transform: translateY(-1px);
        }

        .controls button:active {
            transform: scale(0.97);
        }

        .controls .btn-primary {
            background: #1e6df2;
            color: #fff;
            box-shadow: 0 4px 14px #1e6df260;
        }

        .controls .btn-primary:hover {
            background: #2a7aff;
            box-shadow: 0 6px 20px #1e6df280;
        }

        .controls .btn-danger {
            background: #d32f2f;
            color: #fff;
            box-shadow: 0 4px 14px #d32f2f60;
        }

        .controls .btn-danger:hover {
            background: #e53935;
            box-shadow: 0 6px 20px #d32f2f80;
        }

        .controls .btn-success {
            background: #2e7d32;
            color: #fff;
            box-shadow: 0 4px 14px #2e7d3260;
        }

        .controls .btn-success:hover {
            background: #388e3c;
            box-shadow: 0 6px 20px #2e7d3280;
        }

        .controls button:disabled {
            opacity: 0.4;
            pointer-events: none;
            filter: grayscale(0.5);
        }

        /* ---------- Results ---------- */
        .result-area {
            background: #0f1620;
            border-radius: 16px;
            padding: 16px 18px;
            min-height: 72px;
            border: 1px solid #1f2a38;
            transition: border-color 0.3s;
            margin-top: 4px;
        }

        .result-area.has-result {
            border-color: #4a9eff;
            box-shadow: 0 0 20px #1e6df220;
        }

        .result-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: #6a7f9a;
            margin-bottom: 4px;
        }

        .result-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .result-text {
            font-size: 1rem;
            font-weight: 500;
            word-break: break-all;
            color: #dce6f2;
            line-height: 1.4;
            flex: 1;
        }

        .result-text.placeholder {
            color: #4a5a72;
            font-weight: 400;
            font-style: italic;
        }

        .result-format {
            font-size: 0.7rem;
            background: #1e2a3a;
            padding: 4px 12px;
            border-radius: 30px;
            color: #8aa4c4;
            white-space: nowrap;
            border: 1px solid #2a3a50;
        }

        .result-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .result-actions button {
            background: #1a2535;
            border: none;
            color: #b0c8e0;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: background 0.2s;
            border: 1px solid #2a3a50;
        }

        .result-actions button:hover {
            background: #25344a;
        }

        .result-actions button:active {
            transform: scale(0.96);
        }

        /* ---------- History ---------- */
        .history-toggle {
            margin-top: 14px;
            text-align: center;
        }

        .history-toggle button {
            background: none;
            border: none;
            color: #6a7f9a;
            font-size: 0.8rem;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 30px;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .history-toggle button:hover {
            color: #b0c8e0;
            border-color: #2a3a50;
        }

        .history-list {
            margin-top: 12px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.35s ease, opacity 0.3s ease;
            opacity: 0;
        }

        .history-list.open {
            max-height: 260px;
            opacity: 1;
            overflow-y: auto;
        }

        .history-list::-webkit-scrollbar {
            width: 4px;
        }

        .history-list::-webkit-scrollbar-thumb {
            background: #2a3a50;
            border-radius: 10px;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            border-bottom: 1px solid #1a2535;
            font-size: 0.85rem;
            color: #b0c8e0;
        }

        .history-item .h-text {
            flex: 1;
            word-break: break-all;
            margin-right: 10px;
        }

        .history-item .h-format {
            font-size: 0.6rem;
            background: #1e2a3a;
            padding: 2px 10px;
            border-radius: 20px;
            color: #6a8aaa;
            white-space: nowrap;
        }

        .history-empty {
            text-align: center;
            color: #4a5a72;
            padding: 16px 0;
            font-size: 0.85rem;
        }

        /* ---------- Responsive ---------- */
        @media (max-width: 480px) {
            .scanner-container {
                padding: 16px 12px 20px;
                border-radius: 20px;
            }
            .header h1 {
                font-size: 1.1rem;
            }
            .controls button {
                font-size: 0.8rem;
                padding: 10px 6px;
                min-width: 70px;
            }
            .result-text {
                font-size: 0.9rem;
            }
            .corner-overlay::before,
            .corner-overlay::after {
                width: 22px;
                height: 22px;
            }
            .corner-overlay .br,
            .corner-overlay .br2 {
                width: 22px;
                height: 22px;
            }
        }

        @media (max-width: 380px) {
            .controls {
                flex-direction: column;
            }
            .controls button {
                min-width: unset;
            }
        }
    </style>
</head>
<body>

    <div class="scanner-container">

        <!-- Header -->
        <div class="header">
            /* ---<h1>📸 Scan &amp; Go</h1> --- */ 
<h1>📸JohnRye &amp; Pangit</h1>
            <div class="status-dot">
                <span id="statusLabel">Ready</span>
                <span class="dot" id="statusDot"></span>
            </div>
        </div>

        <!-- Viewfinder -->
        <div class="viewfinder-wrapper">
            <div id="reader"></div>
            <div class="corner-overlay">
                <div class="br"></div>
                <div class="br2"></div>
            </div>
        </div>

        <!-- Controls -->
        <div class="controls">
            <button id="startBtn" class="btn-primary">▶ Start</button>
            <button id="stopBtn" class="btn-danger" disabled>⏹ Stop</button>
            <button id="clearBtn" class="btn-success">✕ Clear</button>
        </div>

        <!-- Result -->
        <div class="result-area" id="resultArea">
            <div class="result-label">📋 Scanned Result</div>
            <div class="result-content">
                <span class="result-text placeholder" id="resultText">Awaiting scan…</span>
                <span class="result-format" id="resultFormat">—</span>
            </div>
            <div class="result-actions">
                <button id="copyBtn" disabled>📄 Copy</button>
                <button id="saveBtn" disabled>💾 Save</button>
            </div>
        </div>

        <!-- History -->
        <div class="history-toggle">
            <button id="historyToggleBtn">📜 History (<span id="historyCount">0</span>)</button>
        </div>
        <div class="history-list" id="historyList">
            <div class="history-empty" id="historyEmpty">No scans yet.</div>
            <div id="historyItems"></div>
        </div>

    </div>

    <script>
        (function() {
            'use strict';

            // ---------- DOM refs ----------
            const readerEl = document.getElementById('reader');
            const startBtn = document.getElementById('startBtn');
            const stopBtn = document.getElementById('stopBtn');
            const clearBtn = document.getElementById('clearBtn');
            const resultText = document.getElementById('resultText');
            const resultFormat = document.getElementById('resultFormat');
            const resultArea = document.getElementById('resultArea');
            const copyBtn = document.getElementById('copyBtn');
            const saveBtn = document.getElementById('saveBtn');
            const statusDot = document.getElementById('statusDot');
            const statusLabel = document.getElementById('statusLabel');
            const historyToggleBtn = document.getElementById('historyToggleBtn');
            const historyList = document.getElementById('historyList');
            const historyItems = document.getElementById('historyItems');
            const historyEmpty = document.getElementById('historyEmpty');
            const historyCount = document.getElementById('historyCount');

            // ---------- State ----------
            let html5QrCode = null;
            let isScanning = false;
            let lastResult = null; // { text, format }
            let scanHistory = []; // array of { text, format, timestamp }

            // ---------- Helpers ----------
            function setStatus(active, label) {
                if (active) {
                    statusDot.className = 'dot';
                    statusLabel.textContent = label || 'Scanning';
                } else {
                    statusDot.className = 'dot inactive';
                    statusLabel.textContent = label || 'Idle';
                }
            }

            function updateResult(text, format) {
                if (!text) {
                    resultText.textContent = 'Awaiting scan…';
                    resultText.className = 'result-text placeholder';
                    resultFormat.textContent = '—';
                    resultArea.classList.remove('has-result');
                    copyBtn.disabled = true;
                    saveBtn.disabled = true;
                    lastResult = null;
                    return;
                }
                resultText.textContent = text;
                resultText.className = 'result-text';
                resultFormat.textContent = format || 'Unknown';
                resultArea.classList.add('has-result');
                copyBtn.disabled = false;
                saveBtn.disabled = false;
                lastResult = { text, format: format || 'Unknown' };
            }

            function addToHistory(text, format) {
                const entry = {
                    text,
                    format: format || 'Unknown',
                    timestamp: Date.now()
                };
                scanHistory.push(entry);
                renderHistory();
            }

            function renderHistory() {
                historyCount.textContent = scanHistory.length;
                if (scanHistory.length === 0) {
                    historyItems.innerHTML = '';
                    historyEmpty.style.display = 'block';
                    return;
                }
                historyEmpty.style.display = 'none';
                let html = '';
                // show newest first
                const reversed = [...scanHistory].reverse();
                for (const item of reversed) {
                    const time = new Date(item.timestamp).toLocaleTimeString();
                    html += `
                        <div class="history-item">
                            <span class="h-text">${escapeHtml(item.text)}</span>
                            <span class="h-format">${escapeHtml(item.format)}</span>
                        </div>
                    `;
                }
                historyItems.innerHTML = html;
            }

            // simple escape to prevent XSS via scanned content
            function escapeHtml(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            // ---------- Scanner callbacks ----------
            function onScanSuccess(decodedText, decodedResult) {
                // decodedResult.result.format.formatName gives the format
                const formatName = decodedResult?.result?.format?.formatName || 'Unknown';
                const displayFormat = formatName.replace('_', ' ').toUpperCase();

                // update UI
                updateResult(decodedText, displayFormat);
                addToHistory(decodedText, displayFormat);

                // optional: beep or vibrate
                try {
                    if (navigator.vibrate) navigator.vibrate(60);
                } catch (_) { /* ignore */ }

                // flash border
                resultArea.style.transition = 'border-color 0.1s';
                resultArea.style.borderColor = '#66bb6a';
                setTimeout(() => {
                    resultArea.style.borderColor = '';
                }, 300);
            }

            function onScanError(err) {
                // ignore – library calls this frequently
            }

            // ---------- Initialize scanner ----------
            function initScanner() {
                if (html5QrCode) {
                    // already initialized
                    return;
                }

                try {
                    html5QrCode = new Html5Qrcode('reader');
                } catch (e) {
                    console.error('Failed to init scanner:', e);
                    alert('Could not initialize scanner. Please use a modern browser with camera support.');
                    return;
                }

                // config
                const config = {
                    fps: 30,
                    qrbox: { width: 240, height: 200 },
                    aspectRatio: 1.0,
                };

                // We'll start on demand
                // store config for later
                html5QrCode._config = config;
            }

            // ---------- Start scanning ----------
            async function startScanner() {
                if (isScanning) return;
                if (!html5QrCode) {
                    initScanner();
                    if (!html5QrCode) return;
                }

                // Check if already started
                try {
                    const config = html5QrCode._config || { fps: 30, qrbox: { width: 240, height: 200 } };
                    await html5QrCode.start({ facingMode: 'environment' },
                        config,
                        onScanSuccess,
                        onScanError
                    );
                    isScanning = true;
                    setStatus(true, 'Scanning');
                    startBtn.disabled = true;
                    stopBtn.disabled = false;
                } catch (err) {
                    console.error('Start error:', err);
                    // handle camera permission denied etc.
                    if (err.message && err.message.includes('Permission')) {
                        alert('Camera access denied. Please allow camera access and try again.');
                    } else if (err.message && err.message.includes('NotFound')) {
                        alert('No camera found. Please connect a camera.');
                    } else {
                        alert('Could not start scanner: ' + err.message);
                    }
                    setStatus(false, 'Error');
                    startBtn.disabled = false;
                    stopBtn.disabled = true;
                }
            }

            // ---------- Stop scanning ----------
            async function stopScanner() {
                if (!isScanning || !html5QrCode) {
                    // still update UI
                    isScanning = false;
                    startBtn.disabled = false;
                    stopBtn.disabled = true;
                    setStatus(false, 'Stopped');
                    return;
                }
                try {
                    await html5QrCode.stop();
                    isScanning = false;
                    setStatus(false, 'Stopped');
                    startBtn.disabled = false;
                    stopBtn.disabled = true;
                } catch (err) {
                    console.warn('Stop error:', err);
                    // force state
                    isScanning = false;
                    setStatus(false, 'Stopped');
                    startBtn.disabled = false;
                    stopBtn.disabled = true;
                }
            }

            // ---------- Clear result ----------
            function clearResult() {
                updateResult(null, null);
                // don't clear history
            }

            // ---------- Copy ----------
            function copyResult() {
                if (!lastResult) return;
                const text = lastResult.text;
                if (!text) return;
                navigator.clipboard.writeText(text).then(() => {
                    const orig = copyBtn.textContent;
                    copyBtn.textContent = '✅ Copied!';
                    setTimeout(() => { copyBtn.textContent = orig; }, 1500);
                }).catch(() => {
                    // fallback
                    const ta = document.createElement('textarea');
                    ta.value = text;
                    document.body.appendChild(ta);
                    ta.select();
                    document.execCommand('copy');
                    ta.remove();
                    const orig = copyBtn.textContent;
                    copyBtn.textContent = '✅ Copied!';
                    setTimeout(() => { copyBtn.textContent = orig; }, 1500);
                });
            }

            // ---------- Save (download as .txt) ----------
            function saveResult() {
                if (!lastResult) return;
                const text = lastResult.text;
                const format = lastResult.format;
                if (!text) return;
                const content = `Scanned: ${text}\nFormat: ${format}\nDate: ${new Date().toLocaleString()}`;
                const blob = new Blob([content], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `scan-${Date.now()}.txt`;
                document.body.appendChild(a);
                a.click();
                a.remove();
                URL.revokeObjectURL(url);
                const orig = saveBtn.textContent;
                saveBtn.textContent = '💾 Saved!';
                setTimeout(() => { saveBtn.textContent = orig; }, 1500);
            }

            // ---------- History toggle ----------
            function toggleHistory() {
                const isOpen = historyList.classList.toggle('open');
                historyToggleBtn.textContent = isOpen ? '📜 Hide history' : `📜 History (${scanHistory.length})`;
            }

            // ---------- Event listeners ----------
            startBtn.addEventListener('click', startScanner);
            stopBtn.addEventListener('click', stopScanner);
            clearBtn.addEventListener('click', clearResult);
            copyBtn.addEventListener('click', copyResult);
            saveBtn.addEventListener('click', saveResult);
            historyToggleBtn.addEventListener('click', toggleHistory);

            // ---------- Init on load ----------
            window.addEventListener('DOMContentLoaded', () => {
                initScanner();
                setStatus(false, 'Ready');
                updateResult(null, null);
                renderHistory();
                // auto-start? let's not, user clicks start.
            });

            // ---------- Cleanup on page unload ----------
            window.addEventListener('beforeunload', async () => {
                if (isScanning && html5QrCode) {
                    try {
                        await html5QrCode.stop();
                    } catch (_) { /* ignore */ }
                }
            });

            // ---------- Handle visibility change (pause when tab hidden) ----------
            document.addEventListener('visibilitychange', () => {
                if (document.hidden && isScanning) {
                    // pause scanning to save resources
                    // we don't auto-stop, but the library handles it internally
                    // we just update status label
                    setStatus(true, 'Paused');
                } else if (!document.hidden && isScanning) {
                    setStatus(true, 'Scanning');
                }
            });

        })();
    </script>

</body>
</html>
